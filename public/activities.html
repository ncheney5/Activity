<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishy Activities | Activities</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        .going-count {
            font-size: 0.68rem;
            font-weight: 700;
            color: #2e7d32;
            text-align: center;
            min-height: 1rem;
            width: 100%;
            word-break: break-word;
        }
    </style>
</head>
<body>

    <header>
        <div id="hero">
            <img class="hero-img" src="images/hero.jpeg" alt="BYU-Idaho Campus">
            <a id="logo" href="index.html" aria-label="Fishy Activities Home">
                <img src="images/logo.png" alt="Fishy Activities Logo" />
            </a>
        </div>

        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="activities.html">Activities</a></li>
                <li><a href="about.html">About</a></li>
                <li class="nav-auth-slot"></li>
            </ul>
        </nav>
    </header>

   <main>
    <section class="activities-section">

        <div class="quick-nav">
        <a href="addActivities.html" class="quick-nav-btn quick-nav-add" hidden>
            <span class="nav-icon">＋</span>
            <div class="nav-label">
                Add Activity
                <span>Share something fun</span>
            </div>
        </a>
        <a href="wheel.html" class="quick-nav-btn">
            <span class="nav-icon">🎡</span>
            <div class="nav-label">
                Spin the Wheel
                <span>Get a random idea</span>
            </div>
        </a>
    </div>


        <div class="activities-header">
                <div class="filter-wrapper">
                <button type="button" class="filter-btn" onclick="toggleFilters()">☰ Filter</button>

                    <div id="filter-panel" class="filter-panel hidden">
                        <label>
                            <input type="checkbox" id="freeOnly">
                            Free activities only
                        </label>

                        <label>
                            Time:
                            <select id="timeFilter">
                                <option value="all">All</option>
                                <option value="today">Today</option>
                                <option value="week">This Week</option>
                            </select>
                        </label>

                        <label>
                            Sort by:
                            <select id="sortBy">
                                <option value="soonest">Soonest</option>
                                <option value="popular">Most Popular</option>
                            </select>
                        </label>
                    </div>
                </div>

            <h1>Upcoming Activities</h1>
        </div>

            <div class="activity-list" id="activity-list">
                <!-- Cards injected by JS -->
            </div>

        </section>
    </main>

    <footer>
        <p>Copyright &copy; 2026 Fishy Activities</p>
    </footer>

    <script type="module" src="js/auth-ui.js"></script>
    <script type="module" src="js/activities-list.js"></script>

</body>
</html>
