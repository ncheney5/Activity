<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishy Activities | Activities</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <header>
        <div id="hero">
            <img class="hero-img" src="images/hero.jpeg" alt="BYU-Idaho Campus">
            <a id="logo" href="index.html" aria-label="Fishy Activities Home">
                <img src="images/logo.png" alt="Fishy Activities Logo" />
            </a>
        </div>

        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="activities.html">Activities</a></li>
                <li><a href="about.html">About</a></li>
                <li><a class="sign-in" href="sign.html">Sign In</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="activities-section">
            <h1>Upcoming Activities</h1>
            <div class="activity-list" id="activity-list">
                <!-- Cards are injected here by JS -->
            </div>
        </section>
    </main>

    <footer>
        <p>Copyright &copy; 2026 Fishy Activities</p>
    </footer>

    <!-- Shared data layer (swap internals for Firestore when ready) -->
    <script src="activitiesData.js"></script>
    <script>
        // ── Render ──────────────────────────────────────────────────────
        function renderCards(activities) {
            const list = document.getElementById("activity-list");

            list.innerHTML = activities.map((activity, index) => `
                <div class="activity-card" onclick="goToActivity('${activity.id}')">
                    <img src="${activity.image}" alt="${activity.title}">
                    <div class="card-body">
                        <h3 class="card-title">${activity.title}</h3>
                        <p class="card-time">${activity.time}</p>
                        <p class="card-description">${activity.description}</p>
                    </div>
                    <div class="card-actions" onclick="event.stopPropagation()">
                        <button class="btn-going"    onclick="rsvp(this, 'going',    'status-${index}')" title="I'm going">✓</button>
                        <button class="btn-notgoing" onclick="rsvp(this, 'notgoing', 'status-${index}')" title="Not going">✕</button>
                        <span class="rsvp-status" id="status-${index}"></span>
                    </div>
                </div>
            `).join("");
        }

        // ── Init ────────────────────────────────────────────────────────
        getActivities().then(renderCards);

        // ── Navigation ──────────────────────────────────────────────────
        function goToActivity(activityId) {
            window.location.href = `activitiesdescription.html?activity=${activityId}`;
        }

        // ── RSVP ────────────────────────────────────────────────────────
        function rsvp(btn, type, statusId) {
            const actions   = btn.closest(".card-actions");
            const goingBtn  = actions.querySelector(".btn-going");
            const notBtn    = actions.querySelector(".btn-notgoing");
            const status    = document.getElementById(statusId);

            if (btn.classList.contains("active")) {
                btn.classList.remove("active");
                status.textContent = "";
                return;
            }

            goingBtn.classList.remove("active");
            notBtn.classList.remove("active");
            btn.classList.add("active");

            if (type === "going") {
                status.textContent = "Going!";
                status.style.color = "#2e7d32";
            } else {
                status.textContent = "Not going";
                status.style.color = "#c62828";
            }
        }
    </script>

</body>
</html>
