<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishy Activities | Description</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        main#content {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        #title {
            font-size: 2rem;
            color: var(--color-primary);
            margin-bottom: 10px;
        }

        #location,
        #time {
            font-size: 1rem;
            color: #5a7a99;
            margin: 4px 0;
        }

        .maps-link {
            color: var(--color-accent);
            text-decoration: underline;
        }

        #image {
            width: 70%;
            max-width: 300px;
            border-radius: 12px;
            margin: 20px auto;
            display: block;
        }

        #description {
            font-size: 1rem;
            line-height: 1.6;
            color: #444;
            text-align: left;
            margin-top: 16px;
        }

        #not-found {
            margin: 60px auto;
            color: var(--color-accent);
        }

        #cost {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin: 10px 0;
        }
        
        .going-line {
            font-size: 0.95rem;
            color: #2e7d32;
            margin: 8px 0;
        }

        .detail-rsvp {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 16px 0;
            flex-wrap: wrap;
        }

        .detail-rsvp .btn-going,
        .detail-rsvp .btn-notgoing {
            width: auto;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .admin-actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .button-link {
            display: inline-block;
            padding: 10px 16px;
            background: var(--color-primary);
            color: var(--color-light);
            text-decoration: none;
            border-radius: 8px;
            font-family: inherit;
        }

        .button-danger {
            font-family: inherit;
            padding: 10px 16px;
            background: #c62828;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>
        <div id="hero">
            <img class="hero-img" src="images/hero.jpeg" alt="BYU-Idaho Campus">
            <a id="logo" href="index.html" aria-label="Fishy Activities Home">
                <img src="images/logo.png" alt="Fishy Activities Logo" />
            </a>
        </div>

        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="activities.html">Activities</a></li>
                <li><a href="about.html">About</a></li>
                <li class="nav-auth-slot"></li>
            </ul>
        </nav>
    </header>

    <main id="content">
        <p>Loading…</p>
    </main>

    <footer>
        <p>Copyright &copy; 2026 Fishy Activities</p>
    </footer>

    <script type="module" src="js/auth-ui.js"></script>
    <script type="module" src="js/activity-detail.js"></script>

</body>
</html>
