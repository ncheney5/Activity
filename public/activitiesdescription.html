<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishy Activities | Description</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        #title {
            font-size: 2rem;
            color: var(--color-primary);
            margin-bottom: 10px;
        }

        #location,
        #time {
            font-size: 1rem;
            color: #5a7a99;
            margin: 4px 0;
        }

        #image {
            width: 70%;
            max-width: 300px;
            border-radius: 12px;
            margin: 20px auto;
            display: block;
        }

        #description {
            font-size: 1rem;
            line-height: 1.6;
            color: #444;
        }

        #not-found {
            margin: 60px auto;
            color: var(--color-accent);
        }
    </style>
</head>

<body>
    <header>
        <div id="hero">
            <img class="hero-img" src="images/hero.jpeg" alt="BYU-Idaho Campus">
            <a id="logo" href="index.html" aria-label="Fishy Activities Home">
                <img src="images/logo.png" alt="Fishy Activities Logo" />
            </a>
        </div>

        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="activities.html">Activities</a></li>
                <li><a href="about.html">About</a></li>
                <li><a class="sign-in" href="sign.html">Sign In</a></li>
            </ul>
        </nav>
    </header>

    <main id="content">
        <!-- Populated by JS once data resolves -->
    </main>

    <footer>
        <p>Copyright &copy; 2026 Fishy Activities</p>
    </footer>

    <!-- Shared data layer (swap internals for Firestore when ready) -->
    <script src="activitiesData.js"></script>
    <script>
        const params     = new URLSearchParams(window.location.search);
        const activityId = params.get("activity");

        getActivityById(activityId).then((activity) => {
            const content = document.getElementById("content");

            if (!activity) {
                content.innerHTML = `
                    <p id="not-found">Activity not found. <a href="activities.html">Go back to activities.</a></p>
                `;
                return;
            }

            // Update page title
            document.title = `Fishy Activities | ${activity.title}`;

            content.innerHTML = `
                <h1 id="title">${activity.title}</h1>
                <h2 id="location">${activity.location}</h2>
                <h2 id="time">${activity.displayTime}</h2>
                <img id="image" src="${activity.image}" alt="${activity.title}">
                <p id="description">${activity.description}</p>
            `;
        });
    </script>

</body>
</html>
