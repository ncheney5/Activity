<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishy Activities | Add Activities</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header>
        <div id="hero">
            <img class="hero-img" src="images/hero.jpeg" alt="BYU-Idaho Campus">
            <a id="logo" href="main.html" aria-label="Fishy Activities Home">
                <img src="images/logo.png" alt="Fishy Activities Logo" />
            </a>
        </div>

        <nav aria-label="Main navigation">
            <ul>
                <li><a href="main.html">Home</a></li>
                <li><a href="activities.html">Activities</a></li>
                <li><a href="about.html">About</a></li>
                <li><a class="sign-in" href="sign.html">Sign In</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Add an Activity</h1>
        <form id="add-activity-form" action="submit_activity.php" method="POST">
            <label for="activity-name">Activity Name:</label>
            <input type="text" id="activity-name" name="activity_name" required />

            <label for="activity-description">Description:</label>
            <textarea id="activity-description" name="activity_description" required></textarea>

            <label for="activity-location">Location:</label>
            <input type="text" id="activity-location" name="activity_location" required />

            <label for="activity-date">Date:</label>
            <input type="date" id="activity-date" name="activity_date" required />

            <label for="activity-time">Time:</label>
            <input type="text" id="activity-time" name="activity_time" required />

            <button type="submit">Add Activity</button>
        </form>
    </main>
    
    <footer>
        <p>Copyright © 2026 Fishy Activities</p>
    </footer>

</body>
</html>
