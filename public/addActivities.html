<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishy Activities | Add Activities</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        body {
            background: linear-gradient(145deg, #eef4ff, #f5f9ff);
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #1f2937;
            margin: 0;
            min-height: 100vh;
        }

        header,
        footer {
            background-color: #ffffffcc;
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 8px rgba(20, 40, 70, .08);
        }

        main {
            padding: 1.5rem 0.8rem 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 1.9rem;
            margin: 1rem 0 1.5rem;
            color: #15326c;
        }

        #add-activity-form {
            max-width: 520px;
            margin: 0 auto;
            padding: 20px 24px;
            border-radius: 14px;
            background-color: white;
            box-shadow: 0 16px 35px rgba(50, 78, 130, .18);
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        #add-activity-form label {
            font-weight: 600;
            margin-top: 8px;
        }

        #add-activity-form input,
        #add-activity-form textarea,
        #add-activity-form button {
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            padding: 10px 12px;
            font-size: 1rem;
            font-family: inherit;
        }

        #add-activity-form input:focus,
        #add-activity-form textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, .2);
        }

        #add-activity-form button {
            background-color: #2563eb;
            color: white;
            font-weight: 700;
            border: none;
            cursor: pointer;
            margin-top: 8px;
        }

        #add-activity-form button:hover {
            background-color: #1d4ed8;
        }

        #form-message {
            min-height: 1.5em;
            color: #1d4ed8;
            margin-top: 8px;
        }

        footer p {
            text-align: center;
            margin: 0;
            padding: 1rem 0;
            font-size: 0.9rem;
            color: #4b5563;
        }
    </style>
</head>
<body>
    <header>
        <div id="hero">
            <img class="hero-img" src="images/hero.jpeg" alt="BYU-Idaho Campus">
            <a id="logo" href="index.html" aria-label="Fishy Activities Home">
                <img src="images/logo.png" alt="Fishy Activities Logo" />
            </a>
        </div>

        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="activities.html">Activities</a></li>
                <li><a href="about.html">About</a></li>
                <li class="nav-auth-slot"></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Add an Activity</h1>
        <form id="add-activity-form">
            <label for="activity-name">Activity Name:</label>
            <input type="text" id="activity-name" name="activity_name" required />

            <label for="activity-description">Description:</label>
            <textarea id="activity-description" name="activity_description" required rows="4"></textarea>

            <label for="activity-location">Location:</label>
            <input type="text" id="activity-location" name="activity_location" required />

            <label for="activity-date">Date:</label>
            <input type="date" id="activity-date" name="activity_date" required />

            <label for="activity-time">Time (e.g. 14:30):</label>
            <input type="text" id="activity-time" name="activity_time" placeholder="18:00" required />

            <label for="activity-cost">Cost (USD, 0 = free):</label>
            <input type="number" id="activity-cost" name="activity_cost" min="0" step="0.01" value="0" />

            <label for="activity-image">Image URL (optional):</label>
            <input type="url" id="activity-image" name="activity_image" placeholder="https://... or images/hero.jpeg" />

            <button type="submit">Save Activity</button>
            <p id="form-message"></p>
        </form>
    </main>
    
    <footer>
        <p>Copyright &copy; 2026 Fishy Activities</p>
    </footer>

    <script type="module" src="js/auth-ui.js"></script>
    <script type="module" src="js/add-activity.js"></script>

</body>
</html>
