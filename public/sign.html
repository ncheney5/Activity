<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishy Activities | Sign In</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        #auth-error {
            color: #c62828;
            margin-top: 1rem;
            font-size: 0.95rem;
        }
        #google-sign-in {
            margin-top: 1rem;
            padding: 0.65rem 1.25rem;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
        }
        #google-sign-in:hover {
            background: #f5f5f5;
        }
    </style>
</head>
<body>
    <header>
        <div id="hero">
            <img class="hero-img" src="images/hero.jpeg" alt="BYU-Idaho Campus">
            <a id="logo" href="index.html" aria-label="Fishy Activities Home">
                <img src="images/logo.png" alt="Fishy Activities Logo" />
            </a>
        </div>

        <nav aria-label="Main navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="activities.html">Activities</a></li>
                <li><a href="about.html">About</a></li>
                <li><a class="sign-in" href="sign.html">Sign In</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="intro-text">
            <h1>Sign in</h1>
            <p>Sign in with your Google account to RSVP to activities and access features reserved for students.</p>
            <button type="button" id="google-sign-in">Sign in with Google</button>
            <p id="auth-error" role="alert" aria-live="polite" hidden></p>
        </section>
    </main>

    <footer>
        <p>Copyright © 2026 Fishy Activities</p>
    </footer>

    <script type="module" src="js/signInPage.js"></script>
</body>
</html>
